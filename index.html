<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى نور عيني</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #000; color: #fff; text-align: center; overflow: hidden; height: 100vh; width: 100vw; }
        
        .page { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: absolute; top: 0; left: 0; }
        #page1 { display: flex; background: #000; }
        /* صفحة صورة أويلي رجعت زي ما كانت */
        #page2 { background: #000 url('awili.jpg') no-repeat center center; background-size: contain; justify-content: flex-end; padding-bottom: 80px; }
        #page3 { background: #075E54; }
        #page4 { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('dodo.jpg') no-repeat center center; background-size: cover; overflow-y: auto; text-align: right; display: none; }

        .btn { padding: 20px 45px; border: none; border-radius: 50px; font-size: 1.4rem; font-weight: bold; cursor: pointer; margin: 15px; }
        .btn-yes { background: #25D366; color: white; }
        .btn-blue { background: #007bff; color: white; }

        input { padding: 18px; border-radius: 12px; border: none; width: 280px; margin-bottom: 20px; font-size: 1.2rem; text-align: center; color: #000; }
        .glass-box { background: rgba(0,0,0,0.75); border: 1px solid #25D366; padding: 20px; border-radius: 20px; margin: 10px; margin-bottom: 100px; }
    </style>
</head>
<body>

    <div id="page1" class="page">
        <h1>بتحبيني يا رودي؟ 🥺</h1>
        <button class="btn btn-yes" onclick="navTo(2)">أيوة طبعاً 😍</button>
    </div>

    <div id="page2" class="page">
        <button class="btn btn-blue" onclick="navTo(3)">اضغطي ي مزتي 😍💕</button>
    </div>

    <div id="page3" class="page">
        <h2>تاريخنا السري؟ 🔒</h2>
        <input type="text" id="passInput" placeholder="٢١/٩/٢٠١٠">
        <button class="btn btn-yes" onclick="finalCheck()">فتح القفل ✨</button>
    </div>

    <div id="page4" class="page">
        <h1 style="color:#25D366; text-align: center; width:100%; margin-top: 20px;">مراتي اللي بعشقها 😍</h1>
        <div class="glass-box">
            <p id="type-text" style="line-height:1.8; font-size: 1.1rem; color: #fff;"></p>
        </div>
        <audio id="music" loop>
            <source src="amr.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function navTo(num) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const next = document.getElementById('page' + num);
            if(num === 4) { next.style.display = 'block'; } else { next.style.display = 'flex'; }
        }

        function finalCheck() {
            const v = document.getElementById('passInput').value;
            if(v === '٢١/٩/٢٠١٠' || v === '21/9/2010') {
                navTo(4);
                const m = document.getElementById('music');
                m.currentTime = 36;
                m.play().catch(() => {
                    document.addEventListener('click', () => { m.play(); }, { once: true });
                });
                startTyping();
            } else { alert('التاريخ غلط يا هانم! 😜'); }
        }

        function startTyping() {
            // الرسالة كاملة مع تعديل كلمة "بدعي"
            const text = `بحبك ومحبتش غيرك ولا هعرف احب غيرك عشان انتي نور عيني انتي دنيتي انا اصلا عارفه عارف يا بنوتي انتي هديتي اللي انا فرحان بيها وهفضل فرحان بيها طول عمري مقدرش علي بعدك ولا اقدر علي غيابك ولا اقدر اعيش من غيرك وحياتي اللي انا عايش فيها انتي كل حكايتي الحلوه انتي سعادتي وفرحي عمري في يوم ما اقدر أفرط فيكي وعمري في يوم اهتمامي يقل ولو قصرت في حقك تقوليلي بس ده بيبقي غصب من عني والله ينور عيني بس مقدرش اقصر معاكي ابداا انتي النبض انتي الحياه انتي القمر ال بسهر معاه انا كل كلمه بقولها لك حلوه بتبقي طالعه من قلبي والله انتي العشق والحياه بموت فيكي ينور عيني وعمري ما افكر في يوم من الايام ابص لغيرك انتي ماليا عنيا بس انتي الدنيا كلها مش بحبك انا بعشقك وبموت فيكي انتي نور حياتي واحلي حاجه في دنيتي كلها انا ببقي فرحان قولي لما يبقي تعبان وتقوليلي تعالا في حضني مع اننا مش مع بعض بس بحس بالأمان معاكي وبعشقك بحبك اوي وبعشق غيرتك عليا وخوفك عليا وحنيتك عليا ولو حاجه مزعلاني مش انتي السبب بتهوني عليا وبعشق كلامك وطفولتك معايا ن وكل ثانيه حبي ليكي ليزيد كتير اوي اوي انا لو في حاجه اثبت بيها حبي ليكي كنت عملتها من قبل ما افكر بحبك يا احلي هديه حصلت في حياتي خدي البوسه دي اموووواه بعشقك يا بنوتي انتي بنتي واختي وصاحبتي وحياتي وكل الليا ربنا يخليكي ليا يا نور عنيا وما يحرمنيش منك ابدا انتي عارفه في كل الوقت وفي كل ثانيه معاكي بتوحشيني وانا معاكي بحبك بحبك حب الدنيا دي في قلبي ليك فيهاا انا بس عايز اقولك اني مش بحبك انا بعشقك ولو في كلمه اكبر من بعشقك كنت قلتلهالك ولو في كلام يوصف حبي ليكي أو يوصف حتي ربع حبي ليكي انا بحبك لدرجه اني مستعد اعمل اي حاجه واخسر اي حاجه عشان نفضل مع بعض وافضل اعمل ال مستسحيل عشان نبقي مع بعض لو الدنيا كلها قالت مستحيل افضل احاول عشان بجد انتي ليا انا وبس وانا عارف ان في النهايه حبي هو ال هيفوز علي الدنيا وال فيها وعارف أن ربنا حاسس بيا و هيستجيب لدعواتي ل ربنا شايف اكيد انا بحبك ازاي وانتي بالنسبه لي ايه انا اصلا حياتي بقيت حلوه بسببك انتي وجودك خلاني ارجع واحب الحياه وحبيت حياتي عشان انتي وكل يوم يدعي ربنا يحفظك لي ويحميكي ويبعد عنك اي حاجه وحشه ويجعلك من نصيبي كل صلاة بدعي أننا نبقى لبعض...`;
            
            let i = 0;
            const target = document.getElementById('type-text');
            function t() { 
                if(i < text.length) { 
                    target.innerHTML += text.charAt(i); i++; 
                    setTimeout(t, 45); 
                    const p4 = document.getElementById('page4');
                    p4.scrollTop = p4.scrollHeight; 
                } 
            }
            t();
        }
    </script>
</body>
</html>
