<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى نور عيني</title>
    <style>
        body { 
            background-color: black; 
            color: white; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        .page { 
            display: none; 
            padding: 40px 20px; 
            height: 100vh; 
        }
        #page1 { display: block; }
        h1 { font-size: 24px; margin-bottom: 30px; }
        .btn { 
            padding: 15px 30px; 
            font-size: 18px; 
            margin: 10px; 
            cursor: pointer; 
            border-radius: 10px; 
            border: none; 
            font-weight: bold;
        }
        .btn-yes { background-color: #25D366; color: white; }
        .btn-no { background-color: #444; color: white; }
        input { 
            padding: 12px; 
            font-size: 16px; 
            border-radius: 8px; 
            border: none; 
            text-align: center; 
            width: 80%; 
            max-width: 300px;
        }
        #msg { 
            font-size: 18px; 
            line-height: 1.8; 
            white-space: pre-wrap; 
            text-align: right; 
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="page1" class="page">
        <h1>بتحبيني يا رودي؟ 🥺</h1>
        <button class="btn btn-yes" onclick="nextPage(2)">أيوة طبعاً 😍</button>
        <button class="btn btn-no" onclick="alert('ما ينفعش تدوسي لأ! 😜')">لأ 🙄</button>
    </div>

    <div id="page2" class="page">
        <h1>طب تاريخنا السري؟ 🔒</h1>
        <input type="text" id="pass" placeholder="٢١/٩/٢٠١٠">
        <br><br>
        <button class="btn btn-yes" onclick="checkPass()">فتح القفل ✨</button>
    </div>

    <div id="page3" class="page" style="overflow-y: auto;">
        <h1 style="color: #25D366;">مراتي اللي بعشقها 😍</h1>
        <div id="msg"></div>
        <audio id="music" loop>
            <source src="amr.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function nextPage(num) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page' + num).style.display = 'block';
        }

        function checkPass() {
            var val = document.getElementById('pass').value;
            if(val === '٢١/٩/٢٠١٠' || val === '21/9/2010') {
                nextPage(3);
                var m = document.getElementById('music');
                
                // الأغنية تبدأ من ثانية 36
                m.currentTime = 36;
                
                // محاولة التشغيل
                var playPromise = m.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function() {
                        // لو المتصفح منع التشغيل، هيشتغل مع أول لمسة
                        document.body.addEventListener('click', function() { m.play(); }, {once: true});
                    });
                }

                // نص الرسالة
                var text = `بحبك ومحبتش غيرك ولا هعرف احب غيرك عشان انتي نور عيني انتي دنيتي انا اصلا عارفه عارف يا بنوتي انتي هديتي اللي انا فرحان بيها وهفضل فرحان بيها طول عمري مقدرش علي بعدك ولا اقدر علي غيابك ولا اقدر اعيش من غيرك...`;
                
                var i = 0;
                var target = document.getElementById('msg');
                function typing() {
                    if(i < text.length) {
                        target.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(typing, 50);
                    }
                }
                typing();
            } else {
                alert('التاريخ غلط! 😜');
            }
        }
    </script>
</body>
</html>
