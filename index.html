<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى نور عيني</title>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .page { display: none; padding: 30px 15px; height: 100vh; overflow-y: auto; }
        #page1 { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h1 { font-size: 22px; margin-bottom: 25px; }
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 50px; border: none; font-weight: bold; }
        .btn-yes { background-color: #25D366; color: white; }
        .btn-no { background-color: #444; color: white; }
        input { padding: 12px; font-size: 16px; border-radius: 8px; border: none; text-align: center; width: 80%; max-width: 300px; color: #000; }
        #msg { font-size: 17px; line-height: 1.8; white-space: pre-wrap; text-align: right; padding: 20px; color: #fff; }
    </style>
</head>
<body>

    <div id="page1" class="page">
        <h1>بتحبيني يا رودي؟ 🥺</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-yes" onclick="nextPage(2)">أيوة طبعاً 😍</button>
            <button class="btn btn-no" onclick="alert('ما ينفعش تدوسي لأ! 😜')">لأ 🙄</button>
        </div>
    </div>

    <div id="page2" class="page" style="display: none; flex-direction: column; justify-content: center; align-items: center;">
        <h1>طب تاريخنا السري؟ 🔒</h1>
        <input type="text" id="pass" placeholder="٢١/٩/٢٠١٠">
        <br>
        <button class="btn btn-yes" onclick="checkPass()">فتح القفل ✨</button>
    </div>

    <div id="page3" class="page">
        <h1 style="color: #25D366;">مراتي اللي بعشقها 😍</h1>
        <div id="msg"></div>
        <audio id="music" loop preload="auto">
            <source src="amr.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function nextPage(num) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const target = document.getElementById('page' + num);
            target.style.display = (num === 3) ? 'block' : 'flex';
        }

        function checkPass() {
            var val = document.getElementById('pass').value;
            if(val === '٢١/٩/٢٠١٠' || val === '21/9/2010') {
                nextPage(3);
                var m = document.getElementById('music');
                m.currentTime = 36;
                m.play().catch(() => {
                    document.body.addEventListener('click', () => m.play(), {once: true});
                });

                // الرسالة الكاملة بالتعديل (بدعي)
                var text = `بحبك ومحبتش غيرك ولا هعرف احب غيرك عشان انتي نور عيني انتي دنيتي انا اصلا عارفه عارف يا بنوتي انتي هديتي اللي انا فرحان بيها وهفضل فرحان بيها طول عمري مقدرش علي بعدك ولا اقدر علي غيابك ولا اقدر اعيش من غيرك وحياتي اللي انا عايش فيها انتي كل حكايتي الحلوه انتي سعادتي وفرحي عمري في يوم ما اقدر أفرط فيكي وعمري في يوم اهتمامي يقل ولو قصرت في حقك تقوليلي بس ده بيبقي غصب من عني والله ينور عيني بس مقدرش اقصر معاكي ابداا انتي النبض انتي الحياه انتي القمر ال بسهر معاه انا كل كلمه بقولها لك حلوه بتبقي طالعه من قلبي والله انتي العشق والحياه بموت فيكي ينور عيني وعمري ما افكر في يوم من الايام ابص لغيرك انتي ماليا عنيا بس انتي الدنيا كلها مش بحبك انا بعشقك وبموت فيكي انتي نور حياتي واحلي حاجه في دنيتي كلها انا ببقي فرحان قولي لما يبقي تعبان وتقوليلي تعالا في حضني مع اننا مش مع بعض بس بحس بالأمان معاكي وبعشقك بحبك اوي وبعشق غيرتك عليا وخوفك عليا وحنيتك عليا ولو حاجه مزعلاني مش انتي السبب بتهوني عليا وبعشق كلامك وطفولتك معايا ن وكل ثانيه حبي ليكي ليزيد كتير اوي اوي انا لو في حاجه اثبت بيها حبي ليكي كنت عملتها من قبل ما افكر بحبك يا احلي هديه حصلت في حياتي خدي البوسه دي اموووواه بعشقك يا بنوتي انتي بنتي واختي وصاحبتي وحياتي وكل الليا ربنا يخليكي ليا يا نور عنيا وما يحرمنيش منك ابدا انتي عارفه في كل الوقت وفي كل ثانيه معاكي بتوحشيني وانا معاكي بحبك بحبك حب الدنيا دي في قلبي ليك فيهاا انا بس عايز اقولك اني مش بحبك انا بعشقك ولو في كلمه اكبر من بعشقك كنت قلتلهالك ولو في كلام يوصف حبي ليكي أو يوصف حتي ربع حبي ليكي انا بحبك لدرجه اني مستعد اعمل اي حاجه واخسر اي حاجه عشان نفضل مع بعض وافضل اعمل ال مستسحيل عشان نبقي مع بعض لو الدنيا كلها قالت مستحيل افضل احاول عشان بجد انتي ليا انا وبس وانا عارف ان في النهايه حبي هو ال هيفوز علي الدنيا وال فيها وعارف أن ربنا حاسس بيا و هيستجيب لدعواتي ل ربنا شايف اكيد انا بحبك ازاي وانتي بالنسبه لي ايه انا اصلا حياتي بقيت حلوه بسببك انتي وجودك خلاني ارجع واحب الحياه وحبيت حياتي عشان انتي وكل يوم يدعي ربنا يحفظك لي ويحميكي ويبعد عنك اي حاجه وحشه ويجعلك من نصيبي كل صلاه بدعي أننا نبقي لبعض اي حد ممكن يقول اني زهقت من علاقتنا أو مليت عمري مليت منك ابدا يا حبيبتي والله دول مش يومين عشتهم معاكي حلوين وخلاص افضل انا افضل احبك لاخر يوم في عمري انا جمبك لاخر نفس في عمري انا افضل اتعلم الحب معاكي عرفت الحب لما حبيتك حبيتك حب ما فيش واحد يعرف يحبه لحد ما فيش كلام في الدنيا يقدر يوصف انا حبيتك قد اي وتقدري تقولي انا ما صدقت لقيت النص التاني ساعات بحس اني ابنك وبباباكي وانتي بنوتي وحبيبتي وروح قلبي ولو اتكلم عمري كلو مش هديكي حقك من ال انتي بتعمليه معايا مفيش مش احن منك في الدنيا عشان كدا دي الحاجه ال خلتني احبك ومتعلق بيكي برتاح لما اجي افضفلك من حاجات مضيقاني جيتي خديني من وسط عالم غريب كنت تايه فيه كنت كاره حياتي باللي فيهاانتي حياتي غيرتي كل دا وانتي غيرتيني انا شخصيا بس محظوظ عشان انتي دخلتي حياتي انا ربنا عطاني هديه وعوضني بيها عن الدنيا بحالها وخلتيني من كتر منا بحبك حبيت الدنيا ومستعد اعمل اي حاجه عشان نكون مع بعض ولبعد عايزك تكوني عارفه اني بحبك وبحب هزارك وبحب ضحكتك وبموت فيكي اقسم بالله تفكيري انتي حياتي انتي نجمه وقعت من السما ودخلت جوه قلبي وانتي عمري بحب اقضي وقتي معاكي انتي وخده كل وقتي وكل حاجه بحبك وعمري مهحب حد بعدك ولا هحب قدك انتي جنتي ال حلوه ال بهرب من العالم كله معانا وعشان ابقي معاكي وبس ربنا يخليكي ليا وميحرمنيش منك ابدا يروح قلبيي عارفه اني سعات بزعلك بس والله غصب عني مش عايزك تزعلي مني ابدا يتمناه دايما من ربنا انك تكوني ليا الثانية ال بتغيبي فينا عني بيبقا اليوم ملهوش لازمة من غيرك انتي ال بتحبي وقتي لما اكون تعبان مش بلاقي حد غيرك اتكلم معااا كل نبضة فقلبي بحبك ينبض قلبي بتنبض باسمك انتي وبس بحبك يا احلا بنوتة وبحبك يا قلب بابا.`;
                
                var i = 0;
                var target = document.getElementById('msg');
                function typing() {
                    if(i < text.length) {
                        target.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(typing, 50);
                    }
                }
                typing();
            } else { alert('التاريخ غلط! 😜'); }
        }
    </script>
</body>
</html>
