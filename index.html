<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى نور عيني</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #000; color: #fff; text-align: center; overflow: hidden; height: 100vh; width: 100vw; position: relative; }

        /* نوتيفيكيشن واتساب */
        #wa-notify {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: #ffffff; color: #000;
            padding: 10px; border-radius: 12px; display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10000;
            transition: 0.5s ease-in-out; text-align: right;
        }
        #wa-notify.show { top: 15px; }
        .wa-img { width: 40px; height: 40px; background: #25D366; border-radius: 50%; margin-left: 10px; display: flex; justify-content: center; align-items: center; }
        .wa-content { flex: 1; }
        .wa-name { font-weight: bold; color: #075E54; font-size: 0.9rem; display: block; }
        .wa-msg { font-size: 0.85rem; color: #333; }

        /* الصفحات */
        .page { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 15px; position: absolute; top: 0; left: 0; }
        #page1 { display: flex; background: #000; }
        #page2 { background: #000 url('awili.jpg') no-repeat center center; background-size: contain; justify-content: flex-end; padding-bottom: 60px; }
        #page3 { background: #075E54; }
        #page4 { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('dodo.jpg') no-repeat center center; background-size: cover; overflow-y: auto; text-align: right; display: none; }

        /* الأزرار */
        .btn-container { display: flex; flex-direction: row; gap: 10px; justify-content: center; margin-top: 20px; width: 100%; }
        .btn { 
            padding: 15px 25px; border: none; border-radius: 30px; font-size: 1.1rem; 
            font-weight: bold; cursor: pointer; transition: 0.2s; min-width: 120px;
        }
        .btn-yes { background: #25D366; color: white; }
        .btn-no { background: #444; color: white; }
        .btn-blue { background: #007bff; color: white; padding: 18px 40px; }

        input { padding: 15px; border-radius: 10px; border: none; width: 250px; margin-bottom: 20px; font-size: 1.1rem; text-align: center; color: #000; }
        .glass-box { background: rgba(0,0,0,0.8); border: 1px solid #25D366; padding: 20px; border-radius: 15px; margin: 10px; margin-bottom: 80px; }
        #timer { margin: 10px 0; font-size: 1rem; font-weight: bold; color: #25D366; }
        #force-play { display: none; background: #ff4757; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="wa-notify">
        <div class="wa-img"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12.031 6.172c-2.203 0-4.004 1.812-4.004 4.015 0 .86.281 1.656.75 2.312l-.766 2.813 2.891-.75c.625.344 1.328.547 2.078.547 2.203 0 4.004-1.812 4.004-4.015 0-2.219-1.812-4.022-4.053-4.022zM12.031 15c-.656 0-1.281-.156-1.828-.438l-.172-.094-1.297.344.344-1.266-.109-.172c-.313-.531-.484-1.141-.484-1.781 0-1.875 1.516-3.391 3.422-3.391 1.891 0 3.438 1.547 3.438 3.422.016 1.891-1.484 3.438-3.391 3.438z"/></svg></div>
        <div class="wa-content"><span class="wa-name">عبدالرحمن</span><span id="wa-msg-text" class="wa-msg">دوستي "لأ" بالغلط صح؟ 🤔</span></div>
    </div>

    <div id="page1" class="page">
        <h1 style="margin-bottom:20px;">بتحبيني يا رودي؟ 🥺</h1>
        <div class="btn-container">
            <button class="btn btn-yes" onclick="navTo(2)">أيوة طبعاً 😍</button>
            <button class="btn btn-no" id="no-btn" onclick="waTalk()">لأ 🙄</button>
        </div>
    </div>

    <div id="page2" class="page">
        <button class="btn btn-blue" onclick="navTo(3)">اضغطي ي مزتي 😍💕</button>
    </div>

    <div id="page3" class="page">
        <h2 style="margin-bottom:20px;">تاريخنا السري؟ 🔒</h2>
        <input type="text" id="passInput" placeholder="٢١/٩/٢٠١٠">
        <button class="btn btn-yes" onclick="finalCheck()">فتح القفل ✨</button>
    </div>

    <div id="page4" class="page">
        <div id="force-play" onclick="startAudio()">دوسي هنا لو مفيش صوت 🎵</div>
        <h1 style="color:#25D366; margin-top: 15px;">مراتي اللي بعشقها 😍</h1>
        <div id="timer"></div>
        <div class="glass-box"><p id="type-text" style="line-height:1.6; font-size: 1rem;"></p></div>
        <audio id="music" loop preload="auto"><source src="amr.mp3" type="audio/mpeg"></audio>
    </div>

    <script>
        let clicks = 0;
        const funnyMsgs = ["دوستي \"لأ\" بالغلط صح؟ 🤔", "صبعك عِلق ولا إيه؟ 😂", "طب فكري تاني 😜", "خلاص قولي نعم بقى 🙄"];

        function waTalk() {
            const notify = document.getElementById('wa-notify');
            const msgT = document.getElementById('wa-msg-text');
            const b = document.getElementById('no-btn');
            if(clicks < funnyMsgs.length) {
                msgT.innerText = funnyMsgs[clicks];
                notify.classList.add('show');
                setTimeout(() => notify.classList.remove('show'), 2500);
                clicks++;
                let s = 1 - (clicks * 0.25);
                b.style.transform = `scale(${s > 0 ? s : 0})`;
                if(s <= 0) b.style.display = 'none';
            }
        }

        function navTo(num) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const next = document.getElementById('page' + num);
            next.style.display = (num === 4) ? 'block' : 'flex';
        }

        function startAudio() {
            const m = document.getElementById('music');
            m.play();
            document.getElementById('force-play').style.display = 'none';
        }

        function finalCheck() {
            const v = document.getElementById('passInput').value;
            if(v === '٢١/٩/٢٠١٠' || v === '21/9/2010') {
                navTo(4);
                const m = document.getElementById('music');
                m.currentTime = 36;
                m.play().catch(() => {
                    document.getElementById('force-play').style.display = 'inline-block';
                    document.addEventListener('click', startAudio, {once: true});
                    document.addEventListener('touchstart', startAudio, {once: true});
                });
                startCounting(); startTyping();
            } else { alert('التاريخ غلط يا هانم! 😜'); }
        }

        function startTyping() {
            const text = `بحبك ومحبتش غيرك ولا هعرف احب غيرك... (نص الرسالة بالكامل)`;
            let i = 0; const target = document.getElementById('type-text');
            function t() { if(i < text.length) { target.innerHTML += text.charAt(i); i++; setTimeout(t, 45); const p = document.getElementById('page4'); p.scrollTop = p.scrollHeight; } }
            t();
        }

        function startCounting() {
            const start = new Date("2025-10-23T00:00:00").getTime();
            setInterval(() => {
                const now = new Date().getTime() - start;
                const d = Math.floor(now/(1000*60*60*24));
                const h = Math.floor((now%(1000*60*60*24))/(1000*60*60));
                const m = Math.floor((now%(1000*60*60))/(1000*60));
                const s = Math.floor((now%(1000*60))/1000);
                document.getElementById('timer').innerHTML = `💍 بقالنا سوا: ${d} يوم و ${h} ساعة و ${m} دقيقة و ${s} ثانية`;
            }, 1000);
        }
    </script>
</body>
</html>
