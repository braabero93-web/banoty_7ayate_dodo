<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى نور عيني</title>
    <style>
        body { background-color: black; color: white; text-align: center; font-family: Arial, sans-serif; }
        .page { display: none; padding: 50px; }
        #page1 { display: block; }
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 10px; border: none; }
        .btn-yes { background-color: #25D366; color: white; }
        .btn-no { background-color: #444; color: white; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="page1" class="page">
        <h1>بتحبيني يا رودي؟ 🥺</h1>
        <button class="btn btn-yes" onclick="nextPage(2)">أيوة طبعاً 😍</button>
        <button class="btn btn-no" onclick="alert('ما ينفعش تدوسي لأ! 😂')">لأ 🙄</button>
    </div>

    <div id="page2" class="page">
        <h1>طب التاريخ السري بتاعنا؟ 🔒</h1>
        <input type="text" id="pass" placeholder="٢١/٩/٢٠١٠">
        <br><br>
        <button class="btn btn-yes" onclick="checkPass()">فتح القفل ✨</button>
    </div>

    <div id="page3" class="page">
        <h1 style="color: #25D366;">بحبك يا أحلى حاجة في حياتي ❤️</h1>
        <p id="msg" style="font-size: 20px; line-height: 1.6;"></p>
        <audio id="music" loop>
            <source src="amr.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function nextPage(num) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page' + num).style.display = 'block';
        }

        function checkPass() {
            var val = document.getElementById('pass').value;
            if(val === '٢١/٩/٢٠١٠' || val === '21/9/2010') {
                nextPage(3);
                var m = document.getElementById('music');
                m.currentTime = 36; // يبدأ من ثانية 36
                m.play();
                
                // كتابة الرسالة
                var text = "بحبك ومحبتش غيرك... (حط نصك هنا)";
                var i = 0;
                function typing() {
                    if(i < text.length) {
                        document.getElementById('msg').innerHTML += text.charAt(i);
                        i++;
                        setTimeout(typing, 50);
                    }
                }
                typing();
            } else {
                alert('التاريخ غلط! 😜');
            }
        }
    </script>
</body>
</html>
